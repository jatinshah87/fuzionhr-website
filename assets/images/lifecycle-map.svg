  <text x="132" y="494" fill="#FFFFFF" font-family="Space Grotesk, Arial" font-size="22" font-weight="700">1. Hire</text>
  <text x="132" y="530" fill="#FFFFFF" font-family="Manrope, Arial" font-size="16" opacity="0.82">Recruitment pipelines, interview coordination and offer movement.</text>
  <text x="324" y="286" fill="#1F1815" font-family="Space Grotesk, Arial" font-size="22" font-weight="700">2. Activate</text>
  <text x="324" y="322" fill="#5F534C" font-family="Manrope, Arial" font-size="16">Onboarding, induction, access setup and early readiness workflows.</text>
  <text x="534" y="448" fill="#1F1815" font-family="Space Grotesk, Arial" font-size="22" font-weight="700">3. Operate</text>
  <text x="534" y="484" fill="#5F534C" font-family="Manrope, Arial" font-size="16">Core HR, leave, payroll, reimbursement and daily workforce administration.</text>
  <text x="754" y="258" fill="#FFFFFF" font-family="Space Grotesk, Arial" font-size="22" font-weight="700">4. Grow</text>
  <text x="754" y="294" fill="#FFFFFF" font-family="Manrope, Arial" font-size="16" opacity="0.82">Learning, probation and performance programs with better visibility.</text>
  <text x="852" y="486" fill="#1F1815" font-family="Space Grotesk, Arial" font-size="22" font-weight="700">5. Exit</text>
  <text x="852" y="522" fill="#5F534C" font-family="Manrope, Arial" font-size="16">Exit clearance, recovery, settlement and full-and-final closure.</text>
