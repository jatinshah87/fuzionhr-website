  <circle cx="930" cy="250" r="16" fill="#FF5A1F"/>
  <rect x="104" y="450" width="168" height="170" rx="28" fill="#1F1815"/>
  <rect x="294" y="242" width="180" height="170" rx="28" fill="#FFF6F0" stroke="#F2D6C4" stroke-width="2"/>
