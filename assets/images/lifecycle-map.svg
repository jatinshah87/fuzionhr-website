  <text x="94" y="120" fill="#1F1815" font-family="Space Grotesk, Arial" font-size="18" font-weight="700">Connected employee journey</text>
  <text x="94" y="170" fill="#1F1815" font-family="Space Grotesk, Arial" font-size="42" font-weight="700">From hire to exit, one platform stays in sync</text>
  <path d="M148 404C218 314 324 270 432 286C514 298 564 356 650 370C742 384 814 344 918 262" stroke="url(#lifeAccent)" stroke-width="18" stroke-linecap="round"/>
  <circle cx="162" cy="390" r="16" fill="#FF5A1F"/>
  <circle cx="356" cy="300" r="16" fill="#FF8E58"/>
  <circle cx="548" cy="346" r="16" fill="#FFB286"/>
